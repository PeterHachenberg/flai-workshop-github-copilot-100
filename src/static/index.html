<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Aktivitäten</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Mergington High School</h1>
      <h2>Außerschulische Aktivitäten</h2>
    </header>

    <main>
      <section id="activities-container">
        <h3>Verfügbare Aktivitäten</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Aktivitäten werden geladen...</p>
        </div>
      </section>

      <section id="signup-container">
        <h3>Für eine Aktivität anmelden</h3>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Schüler-E-Mail:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Aktivität auswählen:</label>
            <select id="activity" required>
              <option value="">-- Aktivität auswählen --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Anmelden</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2023 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
